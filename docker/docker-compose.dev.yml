# CAMCHAT 개발용 Docker Compose (핫 리로드)
# 실행: docker compose -f docker/docker-compose.dev.yml up

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: ../.env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CORS_ORIGINS=http://localhost:3000,http://localhost
      - CHROMA_PERSIST_DIR=/app/data/chromadb_new
    volumes:
      - ../app:/app/app
      - ../backend:/app/backend
      - ../data:/app/data
      - ../config:/app/config
      # 2026-04-28: scripts mount 추가 — PR 15의 ingest_all_v2.py --patch-doc-types
      # 같은 새 명령을 image rebuild 없이 즉시 사용할 수 있도록.
      - ../scripts:/app/scripts
      # 호스트 모델 캐시 공유 (BGE-M3 / Reranker 재다운로드 방지)
      - ~/.cache/huggingface:/root/.cache/huggingface
    # 2026-04-28: GPU passthrough 복원 — CPU 모드에서 chat 응답 60~120초 발생 →
    #             GPU 가속으로 BGE-M3 임베딩 + Reranker Cross-Encoder 단축.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--workers", "1"]
    restart: unless-stopped

  # 프론트엔드는 로컬 npm run dev 사용 권장 (핫 리로드 빠름)
  # frontend:
  #   ...
